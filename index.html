<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#0f1117;color:#e8e8e8;font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding:24px 16px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:3px;color:#4fc3f7;margin-bottom:4px;}
  .subtitle{font-size:.78rem;color:#666;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;font-family:'IBM Plex Mono',monospace;}
  .tabs{display:flex;gap:6px;margin-bottom:0;flex-wrap:wrap;max-width:1150px;}
  .tab{font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:1px;text-transform:uppercase;padding:8px 16px;border-radius:5px 5px 0 0;cursor:pointer;border:1px solid #2a2f3f;border-bottom:none;background:#0f1117;color:#555;transition:all .15s;}
  .tab:hover{color:#aaa;background:#141820;}
  .tab.active{background:#181c27;color:#fff;border-color:#2a2f3f;}
  .tab.active.wp{border-top:3px solid #4fc3f7;color:#4fc3f7;}
  .tab.active.fr{border-top:3px solid #f97316;color:#f97316;}
  .tab.active.cs{border-top:3px solid #a78bfa;color:#a78bfa;}
  .tab.active.cl{border-top:3px solid #34d399;color:#34d399;}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;opacity:0;transition:opacity .2s;}
  .tab.has-selections .dot{opacity:1;}
  .tab.wp .dot{background:#4fc3f7;}
  .tab.fr .dot{background:#f97316;}
  .tab.cs .dot{background:#a78bfa;}
  .tab.cl .dot{background:#34d399;}
  .tab-border{max-width:1150px;border-bottom:1px solid #2a2f3f;margin-bottom:20px;}
  .layout{display:grid;grid-template-columns:270px 1fr;gap:20px;max-width:1150px;}
  @media(max-width:700px){.layout{grid-template-columns:1fr;}}
  .checklist-panel{background:#181c27;border:1px solid #2a2f3f;border-radius:8px;padding:16px;align-self:start;}
  .panel-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#4fc3f7;margin-bottom:14px;border-bottom:1px solid #2a2f3f;padding-bottom:8px;}
  .section-divider{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:#ffffff;margin:10px 0 6px 0;padding-top:8px;border-top:1px solid #1e2435;}
  .sub-section{font-family:'IBM Plex Mono',monospace;font-size:.58rem;letter-spacing:1px;text-transform:uppercase;margin:8px 0 4px 0;padding:4px 8px;border-radius:4px;}

  .sub-section.customer{background:#4fc3f718;color:#4fc3f7;border-left:2px solid #4fc3f7;}
  .check-item{display:flex;align-items:center;gap:10px;padding:6px;border-radius:5px;cursor:pointer;transition:background .15s;margin-bottom:2px;}
  .check-item:hover{background:#1e2435;}
  .check-item input[type=checkbox]{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1.5px solid #3a3f55;border-radius:3px;cursor:pointer;transition:all .15s;flex-shrink:0;position:relative;}
  .check-item input[type=checkbox]:checked{background:#4fc3f7;border-color:#4fc3f7;}
  .check-item input[type=checkbox]:checked::after{content:'v';position:absolute;top:-2px;left:2px;font-size:11px;color:#0f1117;font-weight:bold;}
  .pump-item input[type=checkbox]:checked{background:#f97316!important;border-color:#f97316!important;}
  .drywall-item input[type=checkbox]:checked{background:#a78bfa!important;border-color:#a78bfa!important;}
  .elec-item input[type=checkbox]:checked{background:#34d399!important;border-color:#34d399!important;}
  .misc-item input[type=checkbox]:checked{background:#f87171!important;border-color:#f87171!important;}
  .check-label{font-size:.82rem;color:#c8ccd8;font-family:'IBM Plex Mono',monospace;user-select:none;line-height:1.3;}
  .check-label small{display:block;font-size:.65rem;color:#555;margin-top:1px;}
  .check-label.misc-unchecked{color:#f87171;}
  .tag{font-size:.55rem;letter-spacing:1px;text-transform:uppercase;padding:1px 5px;border-radius:3px;margin-left:4px;font-family:'IBM Plex Mono',monospace;vertical-align:middle;}
  .tag-c{background:#f9731622;color:#f97316;border:1px solid #f9731644;}
  .tag-h{background:#4fc3f722;color:#4fc3f7;border:1px solid #4fc3f744;}

  .child-item{margin-left:14px;border-left:2px solid #1e2435;padding-left:8px;}

  .placeholder-panel{padding:40px 20px;text-align:center;color:#3a3f55;font-family:'IBM Plex Mono',monospace;font-size:.8rem;line-height:2;}
  .placeholder-panel .icon{font-size:2rem;margin-bottom:8px;}
  .output-panel{display:flex;flex-direction:column;gap:16px;}
  .will-block{background:#181c27;border:1px solid #2a2f3f;border-radius:8px;padding:16px 18px;}

  .will-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;margin-bottom:12px;}

  .empty-state{color:#3a3f55;font-style:italic;font-size:.75rem;}
  .initials-text{color:#f97316;}
  .dont-forget{color:#f87171;}
  .dont-forget-done{color:#c8ccd8;}
  .copy-btn{font-family:'IBM Plex Mono',monospace;font-size:.78rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:none;color:#fff;padding:13px 0;border-radius:5px;cursor:pointer;transition:all .15s;width:100%;margin-top:12px;display:block;}
  .contractor .copy-btn{background:#f97316;}
  .contractor .copy-btn:hover{background:#ea6a0a;}
  .customer .copy-btn{background:#0e7faa;}
  .customer .copy-btn:hover{background:#0a6a8f;}
  .copy-btn.copied{background:#16a34a!important;}
  .reset-btn{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;background:transparent;border:1px solid #3a3f55;color:#666;padding:5px 12px;border-radius:4px;cursor:pointer;width:100%;margin-top:12px;transition:all .15s;}
  .reset-btn:hover{border-color:#f87171;color:#f87171;}
  .rebuild-section{max-width:1150px;margin-top:48px;border-top:1px dashed #2a2f3f;padding-top:24px;}
  .rebuild-toggle{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#3a3f55;cursor:pointer;background:none;border:1px dashed #2a2f3f;padding:6px 14px;border-radius:4px;transition:all .15s;}
  .rebuild-toggle:hover{color:#666;border-color:#3a3f55;}
  .rebuild-box{display:none;margin-top:16px;background:#181c27;border:1px solid #2a2f3f;border-radius:8px;padding:20px;}
  .rebuild-box.visible{display:block;}
  .rebuild-label{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:2px;text-transform:uppercase;color:#4fc3f7;margin-bottom:4px;}
  .rebuild-sublabel{font-family:'IBM Plex Mono',monospace;font-size:.62rem;color:#3a3f55;margin-bottom:12px;}
  .rebuild-text{font-family:'IBM Plex Mono',monospace;font-size:.75rem;line-height:1.7;color:#8892a4;white-space:pre-wrap;background:#0f1117;border:1px solid #1e2435;border-radius:5px;padding:14px;user-select:all;}
  .rebuild-copy-btn{font-family:'IBM Plex Mono',monospace;font-size:.65rem;font-weight:500;letter-spacing:1px;text-transform:uppercase;background:#1e2435;border:1px solid #3a3f55;color:#fff;padding:8px 16px;border-radius:4px;cursor:pointer;margin-top:12px;transition:all .15s;}
  .rebuild-copy-btn:hover{background:#2a3450;border-color:#4fc3f7;}
  .rebuild-copy-btn.copied{background:#16a34a;border-color:#16a34a;}
</style>
</head>

<h1>Wills Builder</h1>
<div class="subtitle">Contract Generator</div>

<div class="tabs">
  <div class="tab wp active" onclick="switchTab('wp')" id="tab-wp"><span class="dot"></span>Waterproofing</div>
  <div class="tab fr" onclick="switchTab('fr')" id="tab-fr"><span class="dot"></span>Foundation Repair</div>
  <div class="tab cs" onclick="switchTab('cs')" id="tab-cs"><span class="dot"></span>Crawlspace</div>
  <div class="tab cl" onclick="switchTab('cl')" id="tab-cl"><span class="dot"></span>Concrete Lifting</div>
</div>

<div class="layout">

  <div id="panel-wp" class="checklist-panel">

    <div class="section-divider">System</div>

    <div class="sub-group">
      <div class="sub-group-label">Pump Type</div>
      <div class="check-item pump-item"><input type="checkbox" id="wp-pump-triple" onchange="onPumpChange('triple')"><label class="check-label" for="wp-pump-triple">Triple Pump <span class="tag tag-t">w/ Battery Backup</span></label></div>
      <div class="check-item pump-item"><input type="checkbox" id="wp-pump-single" onchange="onPumpChange('single')"><label class="check-label" for="wp-pump-single">Single Pump <span class="tag tag-s">w/ Battery Backup</span></label></div>
    </div>
    <div class="check-item"><input type="checkbox" id="wp-aquagrate" onchange="update()"><label class="check-label" for="wp-aquagrate">AquaGrate</label></div>
    <div class="check-item"><input type="checkbox" id="wp-ports" onchange="update()"><label class="check-label" for="wp-ports">Inspection Ports</label></div>
    <div class="check-item"><input type="checkbox" id="wp-airsystem" onchange="onAirSystemChange()"><label class="check-label" for="wp-airsystem">AirSystem</label></div>
    <div class="child-item">
      <div class="check-item" id="condensate-row" style="opacity:0.35;pointer-events:none;">
        <input type="checkbox" id="wp-condensate" onchange="update()">
        <label class="check-label" for="wp-condensate">+ Condensate Pump<small>gravity cannot drain</small></label>
      </div>
    </div>
    <div class="check-item"><input type="checkbox" id="wp-wallliner" onchange="update()"><label class="check-label" for="wp-wallliner">Wall Liner</label></div>

    <div class="section-divider">Electrical</div>
    <div class="sub-section contractor">Contractor</div>
    <div class="check-item elec-item"><input type="checkbox" id="wp-elec-gw" onchange="update()"><label class="check-label" for="wp-elec-gw">Electrician <span class="tag tag-c">Contractor</span></label></div>
    <div class="sub-section customer">Customer</div>
    <div class="check-item elec-item"><input type="checkbox" id="wp-elec-ho" onchange="update()"><label class="check-label" for="wp-elec-ho">Electrician <span class="tag tag-h">Customer</span></label></div>

    <div class="section-divider">Demolition</div>
    <div class="sub-section contractor">Contractor</div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-drywall-gw-half" onchange="onDrywallChange('gw-half')"><label class="check-label" for="wp-drywall-gw-half">Drywall 1/2 Wall <span class="tag tag-c">Contractor</span></label></div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-drywall-gw-full" onchange="onDrywallChange('gw-full')"><label class="check-label" for="wp-drywall-gw-full">Drywall Full Wall <span class="tag tag-c">Contractor</span></label></div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-cut-gw" onchange="update()"><label class="check-label" for="wp-cut-gw">Cut Through <span class="tag tag-c">Contractor</span></label></div>
    <div class="check-item"><input type="checkbox" id="wp-stairs" onchange="update()"><label class="check-label" for="wp-stairs">Stairs <span class="tag tag-c">Contractor</span></label></div>
    <div class="sub-section customer">Customer</div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-drywall-ho-half" onchange="onDrywallChange('ho-half')"><label class="check-label" for="wp-drywall-ho-half">Drywall 1/2 Wall <span class="tag tag-h">Customer</span></label></div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-drywall-ho-full" onchange="onDrywallChange('ho-full')"><label class="check-label" for="wp-drywall-ho-full">Drywall Full Wall <span class="tag tag-h">Customer</span></label></div>
    <div class="check-item drywall-item"><input type="checkbox" id="wp-cut-ho" onchange="update()"><label class="check-label" for="wp-cut-ho">Cut Through <span class="tag tag-h">Customer</span></label></div>
    <div class="check-item"><input type="checkbox" id="wp-baseboard" onchange="update()"><label class="check-label" for="wp-baseboard">Baseboard Heater <span class="tag tag-h">Customer</span></label></div>

    <div class="section-divider">Site</div>
    <div class="check-item"><input type="checkbox" id="wp-digsafe" onchange="update()"><label class="check-label" for="wp-digsafe">DigSafe Flags</label></div>

    <div class="section-divider">Misc</div>
    <div class="check-item misc-item"><input type="checkbox" id="wp-utilities" onchange="update()"><label class="check-label misc-unchecked" id="lbl-utilities" for="wp-utilities">Utilities Protection</label></div>
    <div class="check-item misc-item"><input type="checkbox" id="wp-permit" onchange="update()"><label class="check-label misc-unchecked" id="lbl-permit" for="wp-permit">Permit B</label></div>
    <div class="check-item misc-item"><input type="checkbox" id="wp-msp" onchange="update()"><label class="check-label misc-unchecked" id="lbl-msp" for="wp-msp">5 yr MSP</label></div>

    <button class="reset-btn" onclick="resetWP()">Reset Waterproofing</button>
  </div>

  <div id="panel-fr" class="checklist-panel" style="display:none;">
    <div class="placeholder-panel">
      <div class="icon">🏗</div>
      Foundation Repair<br>checklist coming soon.<br><br>
      <span style="font-size:.65rem;color:#2a3450;">Provide checklist items and<br>will language to activate this tab.</span>
    </div>
  </div>

  <div id="panel-cs" class="checklist-panel" style="display:none;">
    <div class="placeholder-panel">
      <div class="icon">🕳</div>
      Crawlspace Encapsulation<br>checklist coming soon.<br><br>
      <span style="font-size:.65rem;color:#2a3450;">Provide checklist items and<br>will language to activate this tab.</span>
    </div>
  </div>

  <div id="panel-cl" class="checklist-panel" style="display:none;">
    <div class="placeholder-panel">
      <div class="icon">🪨</div>
      Concrete Lifting<br>checklist coming soon.<br><br>
      <span style="font-size:.65rem;color:#2a3450;">Provide checklist items and<br>will language to activate this tab.</span>
    </div>
  </div>

  <div class="output-panel">
    <div class="will-block contractor">
      <div class="will-title">Contractor Wills</div>
      <div class="will-content" id="contractor-output"><span class="empty-state">Select items from the checklist to generate contractor wills...</span></div>
      <button class="copy-btn" id="copy-contractor" onclick="copyText('contractor')">Copy Contractor Wills</button>
    </div>
    <div class="will-block customer">
      <div class="will-title">Customer Wills</div>
      <div class="will-content" id="customer-output"><span class="empty-state">Select items from the checklist to generate customer wills...</span></div>
      <button class="copy-btn" id="copy-customer" onclick="copyText('customer')">Copy Customer Wills</button>
    </div>
  </div>
</div>

<div class="rebuild-section">
  <button class="rebuild-toggle" onclick="toggleRebuild()">Show Claude Rebuild Prompt</button>
  <div class="rebuild-box" id="rebuild-box">
    <div class="rebuild-label">Claude Rebuild Prompt</div>
    <div class="rebuild-sublabel">Paste this into claude.ai to recreate this exact tool from scratch</div>
    <div class="rebuild-text" id="rebuild-text">I work for Groundworks as a sales rep. I need you to rebuild a Wills Builder app as an interactive HTML widget, and also provide a copyable HTML page so I can paste the code into GitHub Pages.

BACKGROUND:
We use a contract system where two freeform text fields called Contractor Wills and Customer Wills are filled in based on what services are sold. I need a checklist-driven tool that auto-generates the correct will language. Browser tab title and page title are both just "Wills Builder". Subtitle is "Contract Generator" with no Groundworks prefix.

OVERALL STRUCTURE:
Four project tabs: Waterproofing, Foundation Repair, Crawlspace, Concrete Lifting. Each tab independent. Tabs have colored dot when items checked. Only Waterproofing active - others show placeholders. Section divider labels WHITE. Tab colors: Waterproofing #4fc3f7, Foundation Repair #f97316, Crawlspace #a78bfa, Concrete Lifting #34d399.

WATERPROOFING CHECKLIST SECTIONS:

SYSTEM: Gutter/Perimeter Drain, Pump Type (Triple or Single - mutually exclusive), AquaGrate, Inspection Ports, AirSystem (with child Condensate Pump grayed until AirSystem checked), Wall Liner.

ELECTRICAL: Sub-labeled Contractor and Customer sections.
- Contractor: Electrician with orange Contractor tag
- Customer: Electrician with blue Customer tag

DEMOLITION: Two sub-sections labeled Contractor and Customer with colored left-border bars.
- Contractor sub-section: Drywall 1/2 Wall (Contractor tag), Drywall Full Wall (Contractor tag), Cut Through (Contractor tag), Stairs (Contractor tag)
- Customer sub-section: Drywall 1/2 Wall (Customer tag), Drywall Full Wall (Customer tag), Cut Through (Customer tag), Baseboard Heater (Customer tag)
- All four drywall options mutually exclusive across both sections.

SITE: DigSafe Flags (optional)

MISC: Always-visible section at bottom. Three items always shown in RED until checked, then white:
- Utilities Protection
- Permit B
- 5 yr MSP

OUTPUT PANEL: After the generated wills bullets, show a "Don't Forget" block at the bottom of EACH will block. The three MISC items (Utilities Protection, Permit B, 5yr MSP) always appear there. If unchecked in checklist: shown in RED. If checked: shown in normal white text.

LANGUAGE RULES:
- AirSystem WITHOUT condensate: "Groundworks will install an AirSystem. The system will drain by gravity into the existing waterproofing system."
- AirSystem WITH condensate: expands to include condensate pump language.
- Drywall Customer 1/2 Wall: "lower 10 inches of studs" (NOT 18 inches)
- Cut Through GW and HO both end with liquid nails + warranty language.
- Drywall GW bullets both end with liquid nails + warranty language.
- Liquid nails text: "If/when any base plate(s) are reinstalled, nails MUST NOT be used to secure the base plate(s) to the concrete floor, as the drainage system is located beneath and will be damaged. This will also void your warranty. A construction adhesive such as Liquid Nails or comparable must be used instead."
- Plural language throughout: base plate(s), wall(s), section(s)

ALWAYS-PRESENT CONTRACTOR footer: Homeowner has reviewed and understands contractor wills. Customer Initials: X______________
ALWAYS-PRESENT CUSTOMER header: Homeowner to provide parking. Homeowner to remove personal effects.
ALWAYS-PRESENT CUSTOMER footer: Full demolition responsibility language. Homeowner has reviewed. Customer Initials: X______________

DESIGN: Dark #0f1117, panels #181c27, borders #2a2f3f. Bebas Neue headings, IBM Plex Mono everywhere else. Orange #f97316 contractor copy button, blue #0e7faa customer copy button, white text. Copy buttons full-width at BOTTOM. Rebuild prompt collapsed at bottom.</div>
    <button class="rebuild-copy-btn" id="rebuild-copy-btn" onclick="copyRebuildPrompt()">Copy Prompt</button>
  </div>
</div>

<script>
function switchTab(tab){
  ['wp','fr','cs','cl'].forEach(function(t){
    document.getElementById('tab-'+t).classList.remove('active');
    var p=document.getElementById('panel-'+t);if(p)p.style.display='none';
  });
  document.getElementById('tab-'+tab).classList.add('active');
  var p=document.getElementById('panel-'+tab);if(p)p.style.display='block';
}

function gutterBullet(p){
  var d=p==='triple'?'a triple sump pump with battery backup':p==='single'?'a single sump pump with battery backup':'a sump pump';
  return 'Groundworks will install a perimeter drain system to terminate into a sump pump basin containing '+d+'. Groundworks always recommends a full perimeter drain for maximum protection against groundwater seepage.';
}
function airBullet(c){
  return c
    ?'Groundworks will install an AirSystem in the utility room. A condensate pump will also be installed to remove moisture collected by the AirSystem, as gravity drainage is not sufficient in this installation.'
    :'Groundworks will install an AirSystem. The system will drain by gravity into the existing waterproofing system.';
}
var LN=' If/when any base plate(s) are reinstalled, nails MUST NOT be used to secure the base plate(s) to the concrete floor, as the drainage system is located beneath and will be damaged. This will also void your warranty. A construction adhesive such as Liquid Nails or comparable must be used instead.';
var CB={
  wallliner:'Groundworks will install wall liner from sill plate to gutter on any wall containing a perimeter drain system.',
  aquagrate:'Groundworks will install AquaGrate, which IS NOT positioned on a footing; however, the design is meant to accommodate obstructions, which would otherwise need to be temporarily moved (noted on diagram in orange). The homeowner is aware that the cold joint in this area is still susceptible to groundwater seepage and could get wet, but the AquaGrate will connect to the larger drain system and catch water that passes over the floor until it reaches the drain.',
  ports:'Groundworks will install inspection ports along drain system for inspection purposes.',
  elecGW:'Groundworks will install dedicated electrical outlets as required by the scope of work. Groundworks always recommends dedicated outlet(s) for sump pumps to ensure circuits are not tripped causing the pump to be inoperable.',
  drywallGWhalf:'Groundworks will remove up to the bottom one-half of drywall, insulation, and wall studs, but only as necessary as determined by the foreman to properly perform the requested waterproofing work. Materials will be set aside or disposed of at the customer\'s request. Customer is responsible for replacement.'+LN,
  drywallGWfull:'Groundworks will remove the entire wall, including drywall, insulation, and wall studs, but only as necessary as determined by the foreman to properly perform the requested waterproofing work. Materials will be set aside or disposed of at the customer\'s request. Customer is responsible for replacement.'+LN,
  stairs:'Groundworks will remove and set aside any landings or stair treads to gain access to the working area. Groundworks cannot guarantee the condition of any wood once removed. Groundworks will attempt to reinstall stair treads upon completion of work, provided they are in good condition and safe to reuse. Homeowner is responsible for replacement of any stair components that cannot be safely reinstalled.',
  cutGW:'Groundworks will remove section(s) of perpendicular wall(s), approximately 10" x 10" each, as necessary to allow the waterproofing system to pass through. Homeowner is responsible for replacement and repair of any materials removed.'+LN,
};
var HB={
  elecHO:'Homeowner will install dedicated electrical outlets as required by the scope of work. Groundworks always recommends dedicated outlet(s) for sump pumps to ensure circuits are not tripped causing the pump to be inoperable.',
  drywallHOhalf:'Homeowner will remove the bottom base plate(s) and the lower 10 inches of studs as measured from the floor. Customer will be responsible for replacement. This includes base plate(s), drywall, insulation, electrical boxes, and any other items that would prevent access to the working area.',
  drywallHOfull:'Homeowner will remove the entire wall(s), including base plate(s), drywall, insulation, wall studs, electrical boxes, and any other items that would prevent access to the working area. Customer will be responsible for full replacement of all removed materials.',
  cutHO:'Homeowner will remove section(s) of perpendicular wall(s), approximately 10" x 10" each, prior to installation to allow the waterproofing system to pass through. Homeowner is responsible for replacement and repair of all materials removed.'+LN,
  baseboard:'Homeowner to hire contractor/plumber to cut and cap baseboard heaters.',
  digsafe:'Homeowner agrees to leave any DigSafe flags in place that mark underground lines and/or hazards that the installation crew will need to be aware of.',
};
var CHEADER=['Homeowner to provide parking for Groundworks truck and crew.','Homeowner to remove personal effects from working area.'];
var CFOOTER=['Homeowner is responsible for repair and replacement of all materials removed, altered, or affected as a result of demolition and installation work performed by Groundworks. This includes, but is not limited to, drywall, insulation (including spray foam), framing, flooring, tile, bathroom fixtures, stairs, and any other finished or structural components.','Homeowner has reviewed and understands customer wills.'];
var CONTFOOTER=['Homeowner has reviewed and understands contractor wills.'];
var INITIALS='Customer Initials: X______________';
var MISC_LABELS=['Utilities Protection','Permit B','5 yr MSP'];
var MISC_IDS=['wp-utilities','wp-permit','wp-msp'];
var MISC_LABEL_IDS=['lbl-utilities','lbl-permit','lbl-msp'];

function onPumpChange(s){
  var t=document.getElementById('wp-pump-triple'),sg=document.getElementById('wp-pump-single');
  if(s==='triple'&&t.checked)sg.checked=false;
  if(s==='single'&&sg.checked)t.checked=false;
  update();
}
function onAirSystemChange(){
  var on=document.getElementById('wp-airsystem').checked;
  var row=document.getElementById('condensate-row');
  var chk=document.getElementById('wp-condensate');
  row.style.opacity=on?'1':'0.35';row.style.pointerEvents=on?'auto':'none';
  if(!on)chk.checked=false;
  update();
}
function onDrywallChange(selected){
  var gwh=document.getElementById('wp-drywall-gw-half'),gwf=document.getElementById('wp-drywall-gw-full');
  var hoh=document.getElementById('wp-drywall-ho-half'),hof=document.getElementById('wp-drywall-ho-full');
  if(selected==='gw-half'&&gwh.checked){gwf.checked=false;hoh.checked=false;hof.checked=false;}
  if(selected==='gw-full'&&gwf.checked){gwh.checked=false;hoh.checked=false;hof.checked=false;}
  if(selected==='ho-half'&&hoh.checked){hof.checked=false;gwh.checked=false;gwf.checked=false;}
  if(selected==='ho-full'&&hof.checked){hoh.checked=false;gwh.checked=false;gwf.checked=false;}
  update();
}

function wpHasSelections(){
  return ['wp-gutter','wp-pump-triple','wp-pump-single','wp-aquagrate','wp-ports','wp-airsystem','wp-condensate','wp-wallliner','wp-elec-gw','wp-elec-ho','wp-drywall-gw-half','wp-drywall-gw-full','wp-drywall-ho-half','wp-drywall-ho-full','wp-stairs','wp-cut-gw','wp-cut-ho','wp-baseboard','wp-digsafe']
    .some(function(id){var el=document.getElementById(id);return el&&el.checked;});
}

function update(){
  document.getElementById('tab-wp').classList.toggle('has-selections',wpHasSelections());

  // Update MISC label colors
  MISC_IDS.forEach(function(id,i){
    var chk=document.getElementById(id);
    var lbl=document.getElementById(MISC_LABEL_IDS[i]);
    if(chk&&lbl){
      lbl.className=chk.checked?'check-label dont-forget-done':'check-label misc-unchecked';
    }
  });

  var get=function(id){var el=document.getElementById(id);return el?el.checked:false;};
  var pump=get('wp-pump-triple')?'triple':get('wp-pump-single')?'single':null;
  var cond=get('wp-airsystem')&&get('wp-condensate');

  // CONTRACTOR bullets
  var cL=[];
  if(get('wp-gutter')||pump)cL.push(gutterBullet(pump));
  if(get('wp-wallliner'))cL.push(CB.wallliner);
  if(get('wp-aquagrate'))cL.push(CB.aquagrate);
  if(get('wp-ports'))cL.push(CB.ports);
  if(get('wp-airsystem'))cL.push(airBullet(cond));
  if(get('wp-elec-gw'))cL.push(CB.elecGW);
  if(get('wp-drywall-gw-half'))cL.push(CB.drywallGWhalf);
  if(get('wp-drywall-gw-full'))cL.push(CB.drywallGWfull);
  if(get('wp-stairs'))cL.push(CB.stairs);
  if(get('wp-cut-gw'))cL.push(CB.cutGW);
  CONTFOOTER.forEach(function(l){cL.push(l);});

  // CUSTOMER bullets
  var hL=CHEADER.slice();
  if(get('wp-digsafe'))hL.push(HB.digsafe);
  if(get('wp-elec-ho'))hL.push(HB.elecHO);
  if(get('wp-drywall-ho-half'))hL.push(HB.drywallHOhalf);
  if(get('wp-drywall-ho-full'))hL.push(HB.drywallHOfull);
  if(get('wp-cut-ho'))hL.push(HB.cutHO);
  if(get('wp-baseboard'))hL.push(HB.baseboard);
  CFOOTER.forEach(function(l){hL.push(l);});

  renderWills(cL,'contractor-output',get);
  renderWills(hL,'customer-output',get);
}

function renderWills(lines,elId,get){
  var el=document.getElementById(elId);
  var parts=lines.map(function(l){
    return '<span>* '+l.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</span>';
  });
  parts.push('<span class="initials-text">*\n* '+INITIALS+'</span>');

  // Don't forget block
  parts.push('<span style="display:block;margin-top:12px;padding-top:10px;border-top:1px solid #1e2435;font-family:\'IBM Plex Mono\',monospace;font-size:.65rem;letter-spacing:1px;color:#555;text-transform:uppercase;">Don\'t Forget</span>');
  MISC_IDS.forEach(function(id,i){
    var checked=get(id);
    var cls=checked?'dont-forget-done':'dont-forget';
    var icon=checked?'v':'!';
    parts.push('<span class="'+cls+'">'+icon+' '+MISC_LABELS[i]+'</span>');
  });

  el.innerHTML=parts.join('\n');
}

function copyText(which){
  var el=document.getElementById(which+'-output');
  var btn=document.getElementById('copy-'+which);
  // Copy plain text only (without don't forget section for pasting into contract)
  var spans=el.querySelectorAll('span');
  var lines=[];
  for(var i=0;i<spans.length;i++){
    var txt=spans[i].innerText;
    if(txt&&!spans[i].classList.contains('dont-forget')&&!spans[i].classList.contains('dont-forget-done')&&txt.indexOf("Don't Forget")===-1){
      lines.push(txt);
    }
  }
  navigator.clipboard.writeText(lines.join('\n\n')).then(function(){
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(function(){btn.textContent=which==='contractor'?'Copy Contractor Wills':'Copy Customer Wills';btn.classList.remove('copied');},2000);
  });
}

function resetWP(){
  ['wp-gutter','wp-pump-triple','wp-pump-single','wp-aquagrate','wp-ports','wp-airsystem','wp-condensate','wp-wallliner','wp-elec-gw','wp-elec-ho','wp-utilities','wp-drywall-gw-half','wp-drywall-gw-full','wp-drywall-ho-half','wp-drywall-ho-full','wp-stairs','wp-cut-gw','wp-cut-ho','wp-baseboard','wp-digsafe','wp-permit','wp-msp']
    .forEach(function(id){var el=document.getElementById(id);if(el)el.checked=false;});
  document.getElementById('condensate-row').style.opacity='0.35';
  document.getElementById('condensate-row').style.pointerEvents='none';
  document.getElementById('contractor-output').innerHTML='<span class="empty-state">Select items from the checklist to generate contractor wills...</span>';
  document.getElementById('customer-output').innerHTML='<span class="empty-state">Select items from the checklist to generate customer wills...</span>';
  update();
}

function toggleRebuild(){document.getElementById('rebuild-box').classList.toggle('visible');}
function copyRebuildPrompt(){
  var text=document.getElementById('rebuild-text').innerText;
  var btn=document.getElementById('rebuild-copy-btn');
  navigator.clipboard.writeText(text).then(function(){
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(function(){btn.textContent='Copy Prompt';btn.classList.remove('copied');},2000);
  });
}
update();
</script>

function copyAll(){
  var ta=document.getElementById('code');
  ta.select();ta.setSelectionRange(0,99999);
  navigator.clipboard.writeText(ta.value).then(function(){
    var btn=document.getElementById('btn');
    btn.textContent='Copied! Now paste into your GitHub index.html';
    btn.classList.add('copied');
  });
}
